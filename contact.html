<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | My Site</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: #2c3e50;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.4rem;
      letter-spacing: 0.05em;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.95rem;
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    nav a:hover,
    nav a.active {
      opacity: 1;
    }

    .page-hero {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: #fff;
      text-align: center;
      padding: 3.5rem 2rem;
    }

    .page-hero h2 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .page-hero p {
      opacity: 0.9;
      font-size: 1rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .form-card {
      background: #fff;
      border-radius: 8px;
      padding: 2.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: bold;
      margin-bottom: 0.4rem;
      color: #2c3e50;
    }

    label .required {
      color: #e74c3c;
      margin-left: 0.3rem;
      font-size: 0.8rem;
    }

    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #333;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52,152,219,0.15);
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 140px;
    }

    .submit-btn {
      display: block;
      width: 100%;
      padding: 0.85rem;
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: #2980b9;
    }

    .note {
      font-size: 0.85rem;
      color: #888;
      margin-top: 1rem;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 1.2rem;
      font-size: 0.85rem;
      color: #999;
      background: #fff;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>

  <header>
    <h1><a href="index.html" style="color:#fff;text-decoration:none;">My Site</a></h1>
    <nav>
      <a href="index.html">ホーム</a>
      <a href="index.html#services">サービス</a>
      <a href="contact.html" class="active">お問い合わせ</a>
    </nav>
  </header>

  <section class="page-hero">
    <h2>お問い合わせ</h2>
    <p>ご質問・ご要望などお気軽にお送りください。</p>
  </section>

  <main class="container">
    <div class="form-card">
      <form action="#" method="post" novalidate>

        <div class="form-group">
          <label for="name">お名前<span class="required">必須</span></label>
          <input type="text" id="name" name="name" placeholder="山田 太郎" required>
        </div>

        <div class="form-group">
          <label for="email">メールアドレス<span class="required">必須</span></label>
          <input type="email" id="email" name="email" placeholder="example@example.com" required>
        </div>

        <div class="form-group">
          <label for="category">お問い合わせ種別</label>
          <select id="category" name="category">
            <option value="">選択してください</option>
            <option value="service">サービスについて</option>
            <option value="price">料金・見積もり</option>
            <option value="support">サポート</option>
            <option value="other">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">お問い合わせ内容<span class="required">必須</span></label>
          <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください。" required></textarea>
        </div>

        <button type="submit" class="submit-btn">送信する</button>
        <p class="note">通常2〜3営業日以内にご返信いたします。</p>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 My Site. All rights reserved.</p>
  </footer>

</body>
</html>
