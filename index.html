<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サンプルページ</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: #2c3e50;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.4rem;
      letter-spacing: 0.05em;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.95rem;
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    nav a:hover {
      opacity: 1;
    }

    .hero {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: #fff;
      text-align: center;
      padding: 5rem 2rem;
    }

    .hero h2 {
      font-size: 2.2rem;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      background: #fff;
      color: #2c3e50;
      padding: 0.75rem 2rem;
      border-radius: 4px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.2s, color 0.2s;
    }

    .btn:hover {
      background: #3498db;
      color: #fff;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .section-title {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 2rem;
      color: #2c3e50;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }

    .card-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .card h3 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: #2c3e50;
    }

    .card p {
      font-size: 0.9rem;
      color: #666;
    }

    .contact {
      background: #2c3e50;
      color: #fff;
      padding: 3rem 2rem;
      text-align: center;
    }

    .contact h2 {
      font-size: 1.6rem;
      margin-bottom: 1rem;
    }

    .contact p {
      opacity: 0.85;
      margin-bottom: 1.5rem;
    }

    .contact .btn {
      background: #3498db;
      color: #fff;
    }

    .contact .btn:hover {
      background: #fff;
      color: #2c3e50;
    }

    footer {
      text-align: center;
      padding: 1.2rem;
      font-size: 0.85rem;
      color: #999;
      background: #fff;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>

  <header>
    <h1>My Site</h1>
    <nav>
      <a href="index.html">ホーム</a>
      <a href="about.html">About</a>
      <a href="news.html">お知らせ</a>
      <a href="#services">サービス</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>
  </header>

  <section class="hero">
    <h2>ようこそ、サンプルページへ</h2>
    <p>このページはサンプルとして作成されました。自由に編集してお使いください。</p>
    <a href="#" class="btn">詳しく見る</a>
  </section>

  <main class="container">
    <h2 class="section-title">サービス紹介</h2>
    <div class="cards">
      <div class="card">
        <div class="card-icon">🎨</div>
        <h3>デザイン</h3>
        <p>ユーザーに伝わる、シンプルで美しいデザインを提供します。</p>
      </div>
      <div class="card">
        <div class="card-icon">⚙️</div>
        <h3>開発</h3>
        <p>モダンな技術を使って、高品質なWebサイトを構築します。</p>
      </div>
      <div class="card">
        <div class="card-icon">📈</div>
        <h3>サポート</h3>
        <p>公開後も継続的なサポートで運用をお手伝いします。</p>
      </div>
    </div>
  </main>

  <section class="contact">
    <h2>お問い合わせ</h2>
    <p>ご質問・ご要望はお気軽にどうぞ。</p>
    <a href="mailto:example@example.com" class="btn">メールを送る</a>
  </section>

  <footer>
    <p>&copy; 2026 My Site. All rights reserved.</p>
  </footer>

</body>
</html>
